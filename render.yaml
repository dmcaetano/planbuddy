services:
  - type: web
    name: planbuddy
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SCHEMA
        value: planbuddy
      - key: MODEL_ID
        value: deepseek/deepseek-v4-flash
      - key: AI_TIMEOUT_MS
        value: "90000"
      - key: DATABASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
